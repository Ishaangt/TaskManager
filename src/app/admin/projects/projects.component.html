<h1>Projects</h1>
<div class="row">
    <div class="col-8 mx-auto">
        <button class="btn btn-primary" data-toggle="modal" data-target="#projectCreateModal">New Project</button>
        <table class="table">
            <thead>
                <th>Project ID</th>
                <th>Project Name</th>
                <th>Date of Start</th>
                <th>Team Size</th>
                <th>Actions</th>
            </thead>
            <tbody>
                <tr *ngFor="let projects of projects;let i = index">
                    <td>{{projects.projectID}}</td>
                    <td>{{projects.projectName}}</td>
                    <td>{{projects.dateOfStart}}</td>
                    <td>{{projects.teamSize}}</td>
                    <td>
                        <button class="btn btn-info" data-toggle="modal" data-target="#projectUpdateModal"
                            (click)="onClickEdit($event,i)">Edit</button>
                        <a href="#" (click)="onClickDelete(index)"><i class="fa fa-times pl-2" aria-hidden="true"
                            style="color: red"></i></a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<form>
    <div class="modal" role="dialog" id="projectCreateModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title">New Project</div>
                    <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body">
                    <div class="form-group row">
                        <label for="txtNewProjectID" class="col-sm-4 col-form-label">Project ID</label>
                        <div class="col-sm-10">
                            <input type="text" id="txtNewProjectID" style="width:80%" class="form-control"
                                placeholder="Project ID" name="ProjectID" [(ngModel)]="createProject.projectID">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="txtNewProjectName" class="col-sm-4 col-form-label">Project Name</label>
                        <div class="col-sm-10">
                            <input type="text" id="txtNewProjectName" style="width:80%" class="form-control"
                                placeholder="Project Name" name="ProjectName" [(ngModel)]="createProject.projectName">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="txtNewDateOfStart" class="col-sm-4 col-form-label">Date of Start</label>
                        <div class="col-sm-10">
                            <input type="date" id="txtNewDateOfStart" style="width:80%" class="form-control"
                                placeholder="Date Of Start" name="DateOfStart" [(ngModel)]="createProject.dateOfStart">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="txtNewTeamSize" class="col-sm-4 col-form-label">Team Size</label>
                        <div class="col-sm-10">
                            <input type="text" id="txtNewTeamSize" style="width:80%" class="form-control"
                                placeholder="Team Size" name="TeamSize" [(ngModel)]="createProject.teamSize">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-warning" data-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" data-dismiss="modal" (click)="onSaveClick()">Save</button>
                </div>
            </div>
        </div>
    </div>
</form>

<form>
    <div class="modal" role="dialog" id="projectUpdateModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title">Update Project</div>
                    <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body">
                    <div class="form-group row">
                        <label for="txtEditProjectID" class="col-sm-4 col-form-label">Project ID</label>
                        <div class="col-sm-10">
                            <input type="text" id="txtEditProjectID" style="width:80%" class="form-control-plain-text"
                                placeholder="Project ID" name="ProjectID" [(ngModel)]="editProject.projectID"
                                disabled="disabled">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="txtEditProjectName" class="col-sm-4 col-form-label">Project Name</label>
                        <div class="col-sm-10">
                            <input type="text" id="txtEditProjectName" style="width:80%" class="form-control"
                                placeholder="Project Name" name="ProjectName" [(ngModel)]="editProject.projectName">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="txtEditDateOfStart" class="col-sm-4 col-form-label">Date of Start</label>
                        <div class="col-sm-10">
                            <input type="date" id="txtEditDateOfStart" style="width:80%" class="form-control"
                                placeholder="Date Of Start" name="DateOfStart" [(ngModel)]="editProject.dateOfStart">
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="txtEditTeamSize" class="col-sm-4 col-form-label">Team Size</label>
                        <div class="col-sm-10">
                            <input type="text" id="txtEditTeamSize" style="width:80%" class="form-control"
                                placeholder="Team Size" name="TeamSize" [(ngModel)]="editProject.teamSize">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-warning" data-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" data-dismiss="modal" (click)="onClickUpdate()">Update</button>
                </div>
            </div>
        </div>
    </div>
</form>
